[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Configuration des marqueurs
markers =
    tips: Tests des tips de jeu
    missions: Tests des missions
    ships: Tests des vaisseaux
    typography: Tests de typographie française
    terminology: Tests de cohérence terminologique
    structure: Tests de structure des fichiers

# Configuration des rapports
addopts = 
    --verbose
    --tb=short
    --capture=no
    --cov=scripts
    --cov-report=term-missing
    --cov-report=html

# Ignorer certains répertoires
norecursedirs = 
    *.egg
    .git
    .tox
    .env
    .venv
    dist
    build
    backups
    temp

# Configuration de l'encodage
# Important pour les fichiers en français
filterwarnings =
    ignore::UnicodeWarning
    ignore::DeprecationWarning

# Configuration pour l'extraction des JAR

[7zip]
# Chemin vers l'exécutable 7zip
path=C:\Program Files\7-Zip\7z.exe

[jar]
# Dossier où extraire les fichiers
extract_dir=jar_content
# Extensions à extraire
extensions=.json,.csv,.txt
# Créer un backup avant extraction
backup=true
# Format de date pour les backups
backup_date_format=%Y%m%d_%H%M%S

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build ZIP
        run: |
          zip -r "starsector-lang-pack-fr-${GITHUB_REF_NAME}.zip" \
            data/ \
            jars/ \
            mod_info.json \
            README.md \
            CHANGELOG.md \
            CONTRIBUTING.md \
            LICENSE

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: starsector-lang-pack-fr-${{ github.ref_name }}.zip
          generate_release_notes: false
          draft: false
          prerelease: false

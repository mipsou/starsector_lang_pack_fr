name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build ZIP
        # Format aligné sur le ZIP de référence : dossier racine
        # starsector_lang_pack_fr/ pour une extraction propre dans mods/,
        # screenshots pics/ inclus, pas de fichiers dev (README/CONTRIBUTING).
        run: |
          git archive --format=zip --prefix="starsector_lang_pack_fr/" \
            -o "starsector-lang-pack-fr-${GITHUB_REF_NAME}.zip" HEAD \
            -- data/ jars/ pics/ mod_info.json CHANGELOG.md LICENSE

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: starsector-lang-pack-fr-${{ github.ref_name }}.zip
          generate_release_notes: false
          draft: false
          prerelease: false

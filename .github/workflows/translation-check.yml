name: Translation Check

on:
  pull_request:
    branches: [ main, dev ]
    paths:
      - '**.json'
      - '**.csv'
      - '**.skin'
  push:
    branches: [ main, dev ]
    paths:
      - '**.json'
      - '**.csv'
      - '**.skin'

jobs:
  check-translation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for NNBSP (U+202F)
        run: |
          echo "Recherche NNBSP (U+202F) problématiques..."
          failed=0
          for file in $(find data localization -name "*.skin" -o -name "*.csv" -o -name "*.json" 2>/dev/null); do
            if grep -P '\x{202F}' "$file" > /dev/null 2>&1; then
              echo "❌ NNBSP trouvé dans : $file"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "⚠️ NNBSP (U+202F) cause des ? en jeu — remplacer par des espaces normales"
            exit 1
          fi
          echo "✅ Pas de NNBSP"

      - name: Check for typographic apostrophes (U+2019)
        run: |
          echo "Recherche apostrophes typographiques (U+2019)..."
          failed=0
          for file in $(find data -name "*.json" -o -name "*.csv" 2>/dev/null); do
            if grep -P '\x{2019}' "$file" > /dev/null 2>&1; then
              echo "❌ Apostrophe typographique trouvée dans : $file"
              grep -n -P '\x{2019}' "$file"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "⚠️ Les apostrophes typographiques (U+2019) causent des ? en jeu — utiliser ' (U+0027)"
            exit 1
          fi
          echo "✅ Pas d'apostrophe typographique"

      - name: Validate JSON syntax (Starsector JSONC)
        run: |
          echo "Validation syntaxe Starsector JSONC..."
          echo "Note: Starsector utilise un JSON relaxé (clés sans guillemets, références [TAG], # commentaires)"
          echo "Seul un contrôle basique de structure est effectué"
          failed=0
          for file in $(find data -name "*.json" -not -path "*/test/*" -not -path "*/.git/*" 2>/dev/null); do
            if ! python3 -c "
          import re, sys
          with open(sys.argv[1], 'r', encoding='utf-8') as f:
              raw = f.read()
          # Strip comments
          clean = re.sub(r'#[^\n]*', '', raw)
          # Check basic bracket matching
          opens = clean.count('{') + clean.count('[')
          closes = clean.count('}') + clean.count(']')
          if abs(opens - closes) > 0:
              print(f'Brackets mismatch: {opens} open vs {closes} close')
              sys.exit(1)
          " "$file" 2>/dev/null; then
              echo "❌ Structure invalide : $file"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "✅ Structure JSONC valide"

      - name: Check for untranslated markers
        run: |
          echo "Recherche marqueurs TODO..."
          for file in $(find data -name "*.json" 2>/dev/null); do
            if grep -l 'TODO_' "$file" > /dev/null 2>&1; then
              echo "⚠️ Marqueur TODO_ trouvé dans : $file"
            fi
          done
          echo "✅ Vérification terminée"

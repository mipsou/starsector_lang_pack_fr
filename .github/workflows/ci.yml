name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Validate JSON files
        run: |
          echo "Validation des fichiers JSON..."
          failed=0
          for file in $(find data localization -name "*.json" 2>/dev/null); do
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "❌ JSON invalide : $file"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "✅ Tous les fichiers JSON sont valides"

      - name: Validate mod_info.json
        run: |
          if [ ! -f "mod_info.json" ]; then
            echo "❌ mod_info.json manquant"
            exit 1
          fi
          python3 -m json.tool mod_info.json > /dev/null
          echo "✅ mod_info.json valide"

      - name: Check UTF-8 encoding
        run: |
          echo "Vérification encodage UTF-8..."
          failed=0
          for file in $(find data localization -name "*.csv" -o -name "*.json" -o -name "*.skin" 2>/dev/null); do
            if ! iconv -f UTF-8 -t UTF-8 "$file" > /dev/null 2>&1; then
              echo "❌ Encodage non UTF-8 : $file"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "✅ Tous les fichiers sont en UTF-8"

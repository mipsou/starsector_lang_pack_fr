name: PR Validation

on:
  pull_request:
    branches: [ main, dev ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          echo "Validation des messages de commit..."
          git fetch origin ${{ github.base_ref }}
          git log --pretty=format:"%s" HEAD ^origin/${{ github.base_ref }} | while read commit_msg; do
            if [[ "$commit_msg" =~ ^Merge.* ]]; then
              continue
            fi
            # Regex permissive : type(scope): message — accepte Unicode dans le message
            if ! echo "$commit_msg" | grep -qP '^(feat|fix|docs|style|refactor|test|chore|ci|release)(\([a-z0-9_-]+\))?: .+$'; then
              echo "❌ Format invalide : $commit_msg"
              echo "Format attendu : type(scope): message"
              exit 1
            fi
          done
          echo "✅ Messages de commit valides"

      - name: Check for sensitive data
        run: |
          git fetch origin ${{ github.base_ref }}
          # Scan TOUS les fichiers modifiés
          git diff --name-only origin/${{ github.base_ref }}..HEAD | while read file; do
            [ -z "$file" ] && continue
            # Workflows : vérifiés par le check "workflow integrity" séparé
            if [[ "$file" == .github/workflows/* ]]; then continue; fi
            # Fichiers de traduction (.csv, .json dans data/) : scan uniquement les patterns forts
            if [[ "$file" == data/*.csv || "$file" == data/*.json || "$file" == localization/* ]]; then
              if git diff origin/${{ github.base_ref }}..HEAD -- "$file" | grep -iE '(password\s*[:=]|api[_-]?key\s*[:=]|BEGIN (RSA |OPENSSH )?PRIVATE KEY|AKIA[0-9A-Z]{16})'; then
                echo "❌ Données sensibles dans fichier traduction : $file"
                exit 1
              fi
            else
              # Tous les autres fichiers : scan large
              if git diff origin/${{ github.base_ref }}..HEAD -- "$file" | grep -iE '(password\s*[:=]|api[_-]?key\s*[:=]|secret\s*[:=]|credentials|BEGIN (RSA |OPENSSH )?PRIVATE KEY|AKIA[0-9A-Z]{16}|ghp_[0-9a-zA-Z]{36}|sk-[0-9a-zA-Z]{48})'; then
                echo "❌ Données sensibles dans : $file"
                exit 1
              fi
            fi
          done
          echo "✅ Pas de données sensibles"

      - name: Check workflow integrity
        run: |
          echo "Vérification intégrité des workflows..."
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E '\.github/workflows/.*\.yml$' | while read file; do
            [ -z "$file" ] && continue
            # Détection injection de commandes via expressions GitHub non protégées
            if grep -P '\$\{\{\s*(github\.event\.(issue|pull_request|comment)\.(title|body)|github\.head_ref)' "$file" 2>/dev/null | grep -v "fromJSON" | grep -vE '^\s*#'; then
              echo "❌ Injection potentielle dans : $file"
              echo "   Les expressions github.event.*.title/body doivent être passées via env, pas inline"
              exit 1
            fi
            # Détection de secrets en dur dans les workflows
            if grep -iE '(ghp_[0-9a-zA-Z]{36}|sk-[0-9a-zA-Z]{48}|AKIA[0-9A-Z]{16})' "$file" 2>/dev/null; then
              echo "❌ Secret en dur dans workflow : $file"
              exit 1
            fi
            # Détection d'actions non épinglées (tag mutable = supply chain attack)
            if grep -P 'uses:\s+\S+@(master|main|latest)\s*$' "$file" 2>/dev/null; then
              echo "⚠️ Action non épinglée (risque supply chain) : $file"
              echo "   Utiliser un tag versionné (@v4) ou un SHA"
              exit 1
            fi
          done
          echo "✅ Workflows sécurisés"

      - name: Check file size
        run: |
          MAX_SIZE_MB=50
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }}..HEAD | while read file; do
            if [ -f "$file" ]; then
              size=$(du -m "$file" | cut -f1)
              if [ "$size" -gt "$MAX_SIZE_MB" ]; then
                echo "❌ Fichier trop gros : $file ($size MB)"
                exit 1
              fi
            fi
          done
          echo "✅ Tailles OK"

      - name: Validate documentation
        run: |
          if [ ! -f "README.md" ]; then
            echo "❌ README.md manquant"
            exit 1
          fi
          echo "✅ Documentation présente"
